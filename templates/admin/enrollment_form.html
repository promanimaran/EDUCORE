{% extends 'base.html' %}
{% block title %}Enroll Student — EduCore{% endblock %}
{% block page_title %}Enroll Student{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="cms-card">
      <div class="cms-card-header">
        <h5><i class="fas fa-clipboard-list me-2"></i>Enroll Student in Course</h5>
        <a href="{{ url_for('admin_enrollment') }}" class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-arrow-left me-1"></i>Back
        </a>
      </div>
      <form method="POST">
        <div class="row g-3 p-3">
          <div class="col-12">
            <label class="form-label">Select Student <span class="text-danger">*</span></label>
            <select name="student_id" class="form-select cms-input" required>
              <option value="">— Choose Student —</option>
              {% for s in students %}
              <option value="{{ s['student_id'] }}">{{ s['name'] }} ({{ s['roll_no'] }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Select Course <span class="text-danger">*</span></label>
            <select name="course_id" class="form-select cms-input" required>
              <option value="">— Choose Course —</option>
              {% for c in courses %}
              <option value="{{ c['course_id'] }}">{{ c['course_name'] }} ({{ c['code'] }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Status</label>
            <select name="status" class="form-select cms-input">
              <option value="Enrolled">Enrolled</option>
              <option value="Completed">Completed</option>
              <option value="Dropped">Dropped</option>
            </select>
          </div>
          <div class="col-12 text-end">
            <a href="{{ url_for('admin_enrollment') }}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save me-1"></i>Enroll Student
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
