{% extends 'base.html' %}
{% block title %}{{ action }} Student — EduCore{% endblock %}
{% block page_title %}{{ action }} Student{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="cms-card">
      <div class="cms-card-header">
        <h5><i class="fas fa-user-graduate me-2"></i>{{ action }} Student</h5>
        <a href="{{ url_for('admin_students') }}" class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-arrow-left me-1"></i>Back
        </a>
      </div>
      <form method="POST">
        <div class="row g-3 p-3">
          <div class="col-md-4">
            <label class="form-label">Roll Number <span class="text-danger">*</span></label>
            <input type="text" name="roll_no" class="form-control cms-input"
                   value="{{ student['roll_no'] if student else '' }}"
                   {{ 'readonly' if student else '' }} required placeholder="e.g. CS2024001"/>
          </div>
          <div class="col-md-8">
            <label class="form-label">Full Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control cms-input"
                   value="{{ student['name'] if student else '' }}" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control cms-input"
                   value="{{ student['email'] if student else '' }}" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control cms-input"
                   value="{{ student['phone'] if student else '' }}"/>
          </div>
          <div class="col-md-6">
            <!-- FIX: name="dept_id" matches DB column -->
            <label class="form-label">Department</label>
            <select name="dept_id" class="form-select cms-input">
              <option value="">— Select Department —</option>
              {% for d in departments %}
              <!-- FIX: d['dept_id'] and d['dept_name'] — not d.id -->
              <option value="{{ d['dept_id'] }}"
                {{ 'selected' if student and student['dept_id']==d['dept_id'] else '' }}>
                {{ d['dept_name'] }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Year</label>
            <select name="year" class="form-select cms-input">
              {% for y in [1,2,3,4] %}
              <option value="{{ y }}" {{ 'selected' if student and student['year']==y else '' }}>Year {{ y }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select cms-input">
              {% for g in ['Male','Female','Other'] %}
              <option value="{{ g }}" {{ 'selected' if student and student['gender']==g else '' }}>{{ g }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Date of Birth</label>
            <input type="date" name="dob" class="form-control cms-input"
                   value="{{ student['dob'] if student else '' }}"/>
          </div>
          <div class="col-md-4">
            <label class="form-label">Admission Year</label>
            <input type="number" name="admission_year" class="form-control cms-input"
                   value="{{ student['admission_year'] if student else '' }}" min="2000" max="2099"/>
          </div>
          <div class="col-12">
            <label class="form-label">Address</label>
            <textarea name="address" class="form-control cms-input" rows="2">{{ student['address'] if student else '' }}</textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password {% if not student %}<span class="text-danger">*</span>{% else %}<small class="text-muted">(leave blank to keep)</small>{% endif %}</label>
            <input type="password" name="password" class="form-control cms-input"
                   {{ 'required' if not student else '' }} placeholder="Min 6 characters"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Status</label>
            <select name="status" class="form-select cms-input">
              {% for st in ['Active','Inactive','Graduated'] %}
              <option value="{{ st }}"
                {{ 'selected' if student and student['status']==st else ('selected' if st=='Active' and not student else '') }}>
                {{ st }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12 text-end mt-2">
            <a href="{{ url_for('admin_students') }}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save me-1"></i>{{ action }} Student
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
