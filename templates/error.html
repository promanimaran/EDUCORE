{% extends 'base.html' %}
{% block title %}Error {{ code }} — EduCore{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div class="error-code">{{ code }}</div>
  <h4 class="text-muted">{{ message }}</h4>
  <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
    <i class="fas fa-home me-2"></i>Go Home
  </a>
</div>
{% endblock %}
{% block auth_content %}
<div class="text-center py-5" style="padding:48px">
  <div class="error-code" style="font-size:80px;font-weight:800;color:#6366f1">{{ code }}</div>
  <h4 class="text-muted">{{ message }}</h4>
  <a href="{{ url_for('login') }}" class="btn btn-primary mt-3">Go to Login</a>
</div>
{% endblock %}
